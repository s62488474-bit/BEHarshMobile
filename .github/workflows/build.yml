name: Build BEHarshMobile APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log; grep -E "error:|warning:|^e:|^w:" build.log | head -60 || true; exit ${PIPESTATUS[0]}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BEHarshMobile-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
